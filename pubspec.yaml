name: infinity_apk
description: Infinity CLI Android companion app for managing autonomous agents.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.2
  # Provides signInAnonymously via firebase_auth.
  firebase_auth: ^4.16.0
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  provider: ^6.1.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
